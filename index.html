<!DOCTYPE html>
<html lang="en">

<head>
    <title>Ryan Frederich</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=JetBrains+Mono:wght@400;600&display=swap">
    <script src="https://kit.fontawesome.com/83640c69a1.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

    <canvas id="binary-rain"></canvas>

    <div class="btn-group">
        <button class="icon-btn" id="binary-btn" title="Toggle binary rain">
            <span class="binary-label">01</span>
        </button>
        <button class="icon-btn" id="shuffle-btn" title="Shuffle color scheme">
            <i class="fa-solid fa-shuffle"></i>
        </button>
    </div>

    <!-- ── Tab nav ── -->

    <nav class="tab-nav">
        <button class="tab-btn active" data-tab="home">Home</button>
        <button class="tab-btn" data-tab="about">About</button>
    </nav>

    <!-- ── Portfolio content ── -->

    <section id="home" class="tab-panel hero active">
        <div class="hero-content">
            <h1>Hi, I'm <span class="name-3d">Ryan</span></h1>
            <h2>Software Engineer</h2>
            <div class="social-links">
                <a href="http://www.linkedin.com/in/ryanfreder" aria-label="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
                <a href="http://www.github.com/ryansurf" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>
                <a href="/resume.pdf" aria-label="Resume"><i class="fa-regular fa-file"></i></a>
            </div>
        </div>
    </section>

    <section id="about" class="tab-panel about">
        <div class="about-content">
            <div class="bio" id="about-bio"></div>
            <img class="selfie" src="./images/selfie.jpg" alt="Ryan Frederich"/>
        </div>
    </section>

    <footer>
        <p class="copyright">&copy; <script>document.write(new Date().getFullYear())</script> Ryan Frederich</p>
    </footer>

    <!-- ── Sticky terminal ── -->

    <div class="term-panel collapsed" id="term-panel">
        <div class="term-header" id="term-toggle">
            <div class="term-dots">
                <span></span><span></span><span></span>
            </div>
            <span class="term-title">terminal</span>
            <span class="term-chevron" id="term-chevron">▼</span>
        </div>
        <div class="term-body" id="term-body">
            <div class="term-output" id="output"></div>
            <div class="term-input-line">
                <span class="term-prompt">ryan@portfolio:~$&nbsp;</span>
                <input type="text" id="cmd-input" autocomplete="off" spellcheck="false">
            </div>
        </div>
    </div>

    <script>
        fetch('about.md')
            .then(r => r.text())
            .then(text => {
                document.getElementById('about-bio').innerHTML = marked.parse(text);
            });
    </script>
    <script>
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
            });
        });
    </script>
    <script src="js/terminal.js"></script>
    <script src="js/colorscheme.js"></script>
    <script src="js/binary.js"></script>

</body>

</html>
